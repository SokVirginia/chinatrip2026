name: Auto Build

on:
  push:
    branches:
      - main
    paths:
      - 'data/**/*.md'
      - 'site/**/*.njk'
      - 'src/**/*'
      - 'scripts/**/*'
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Commit and push updated index.html
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          # Проверяем, есть ли изменения. Если есть - коммитим и пушим.
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-build index.html from new data" && git push)
